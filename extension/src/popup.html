<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCoach</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      min-height: 200px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid #1e293b;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: #7c3aed;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .logo-text { font-weight: 700; font-size: 15px; }
    .logo-text span { color: #a78bfa; }

    /* Content area */
    #content { padding: 14px 16px; }

    /* Loading */
    .loading {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 28px 0; color: #64748b; font-size: 13px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #1e293b;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Auth form */
    .auth-form { display: flex; flex-direction: column; gap: 10px; }
    .auth-form input {
      width: 100%; padding: 8px 12px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 13px;
      outline: none; transition: border-color 0.15s;
    }
    .auth-form input:focus { border-color: #7c3aed; }
    .auth-form input::placeholder { color: #475569; }

    .btn-primary {
      background: #7c3aed; color: white;
      border: none; border-radius: 8px; padding: 9px 16px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background 0.15s; width: 100%;
    }
    .btn-primary:hover { background: #6d28d9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-toggle {
      margin-top: 10px; text-align: center;
      font-size: 12px; color: #64748b;
    }
    .auth-toggle a {
      color: #a78bfa; cursor: pointer; text-decoration: underline;
    }

    .error-msg {
      background: #450a0a; border: 1px solid #7f1d1d;
      border-radius: 8px; padding: 8px 12px;
      font-size: 12px; color: #fca5a5;
    }

    /* Dashboard */
    .user-info {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .user-email { font-size: 12px; color: #64748b; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-signout {
      background: none; border: 1px solid #334155;
      color: #64748b; font-size: 11px; padding: 3px 10px;
      border-radius: 6px; cursor: pointer;
    }
    .btn-signout:hover { color: #e2e8f0; border-color: #64748b; }

    .review-banner {
      background: #1e1b4b; border: 1px solid #3730a3;
      border-radius: 12px; padding: 12px 14px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .review-count { font-size: 28px; font-weight: 800; color: #a78bfa; line-height: 1; }
    .review-label { font-size: 11px; color: #818cf8; margin-top: 2px; }

    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 12px;
    }
    .stat-card {
      background: #1e293b; border-radius: 10px; padding: 10px 12px;
    }
    .stat-value { font-size: 22px; font-weight: 800; color: #e2e8f0; }
    .stat-label { font-size: 10px; color: #64748b; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

    .btn-dashboard {
      display: block; width: 100%;
      background: #1e293b; border: 1px solid #334155;
      color: #94a3b8; text-align: center; padding: 9px;
      border-radius: 8px; font-size: 12px; font-weight: 500;
      text-decoration: none; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-dashboard:hover { background: #334155; color: #e2e8f0; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Leet<span>Coach</span></div>
  </div>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      Loading…
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
